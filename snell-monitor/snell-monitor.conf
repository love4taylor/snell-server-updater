# Snell Monitor configuration file
# Environment variables will override values in this file

# Telegram Bot Token (required)
TELEGRAM_BOT_TOKEN="123456:ABC-DEF1234ghikl-zyx57W2v1u123ew11"

# Telegram Chat ID (required) — user ID / group ID / channel ID
TELEGRAM_CHAT_ID="-1001234567890"

# Error types to monitor, comma-separated
# (e.g.: connection refused, connection timed out, no route to host, ...)
MONITOR_ERRORS="connection refused"

# Cooldown in seconds for repeat alerts of the same domain + error type (default: 3600 = 1 hour)
ALERT_COOLDOWN=3600

# Look back N minutes of logs on startup (0 = skip, 5–10 recommended)
STARTUP_LOOKBACK=10

# Journal poll interval in seconds (default: 1.0)
POLL_INTERVAL=1.0

# Timezone (default: Asia/Shanghai, i.e. UTC+8)
TIMEZONE="Asia/Shanghai"
